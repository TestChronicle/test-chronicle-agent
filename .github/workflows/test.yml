name: Tests
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - 'next'
      - 'main'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test