name: 🔄 Sync Tests to Chronicle

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Tests to Dashboard

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: TestChronicle/test-chronicle-agent@v0.1.0
        with:
          API_KEY: ${{ secrets.API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
