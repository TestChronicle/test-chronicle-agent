name: 🔄 Sync Tests to Chronicle

on:
  # Run daily at 9am UTC (configurable)
  schedule:
    - cron: '0 9 * * *'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'false'

env:
  # Force Node.js 24 for JavaScript actions (GitHub recommendation)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Tests to Dashboard
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git analysis
      
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: 🔨 Build project
        run: npm run build || echo "Note: Build failed but continuing with sync..."
        continue-on-error: true
      
      - name: 🚀 Sync tests to Chronicle
        run: npx test-chronicle-agent sync
        env:
          CHRONICLE_API_KEY: ${{ secrets.CHRONICLE_API_KEY }}
          CHRONICLE_PROJECT_ID: ${{ secrets.CHRONICLE_PROJECT_ID }}
          # CHRONICLE_DASHBOARD_URL defaults to https://test-chronicle.vercel.app
          # Override by adding CHRONICLE_DASHBOARD_URL secret if using self-hosted
          CHRONICLE_DASHBOARD_URL: ${{ secrets.CHRONICLE_DASHBOARD_URL || 'https://test-chronicle.vercel.app' }}
          # Optional: Enable verbose logging
          CHRONICLE_VERBOSE: ${{ github.event.inputs.verbose || 'false' }}
        continue-on-error: true
      
      - name: ✅ Report success
        if: success()
        run: echo "✅ Tests successfully synced to Chronicle Dashboard"
      
      - name: ⚠️ Report failure
        if: failure()
        run: |
          echo "❌ Sync failed. Please check:"
          echo "  1. Secrets are properly set (CHRONICLE_API_KEY, CHRONICLE_PROJECT_ID, CHRONICLE_DASHBOARD_URL)"
          echo "  2. Dashboard is accessible at the configured URL"
          echo "  3. Project ID matches the one in your Chronicle dashboard"
          echo ""
          echo "For troubleshooting, enable verbose logging by running this workflow manually with verbose=true"
          exit 1
