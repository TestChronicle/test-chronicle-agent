name: 📦 Release & Build Action
run-name: Release ${{ inputs.releaseVersion }} by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string
      majorReleaseVersion:
        description: 'Major version tag (e.g., v0)'
        required: true
        type: choice
        options:
          - v0

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build & Release

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run tests
        run: npm test

      - name: 🔨 Build action
        run: npm run build

      - name: 📝 Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📌 Create release commit and tag
        run: |
          git add -A
          git commit -m "release ${{ inputs.releaseVersion }}" --no-verify || echo "No changes to commit"
          git tag ${{ inputs.releaseVersion }}
          git push origin ${{ inputs.releaseVersion }}
          git push origin main

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.releaseVersion }}
          files: |
            dist/action.js
            dist/action.d.ts
            dist/action.js.map
            dist/cli.js
            dist/cli.d.ts
            dist/cli.js.map
            dist/index.js
            dist/index.d.ts
            dist/index.js.map
            action.yml
            package.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📌 Update major version tag
        run: |
          git tag -f ${{ inputs.majorReleaseVersion }}
          git push origin ${{ inputs.majorReleaseVersion }} --force
