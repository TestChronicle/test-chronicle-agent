name: 'Test Chronicle Agent'
description: 'Sync test results and specifications to Test Chronicle dashboard'
author: 'Daniel Williams'

branding:
  icon: 'activity'
  color: 'blue'

inputs:
  api-key:
    description: 'Chronicle API key for authentication'
    required: true
  project-id:
    description: 'Project ID in Chronicle dashboard'
    required: true
  dashboard-url:
    description: 'Chronicle dashboard URL (for local testing only; defaults to production)'
    required: false
    default: 'https://www.testchronicle.com'

outputs:
  sync-status:
    description: 'Status of the sync operation'

runs:
  using: 'node20'
  main: 'dist/action.js'
